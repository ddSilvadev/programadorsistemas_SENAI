<!-- exercicios de listas -->
 <!DOCTYPE html>
 <html lang="pt-br">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>

    <!-- css interno -->
    <style>
        .container-ol li:hover {
            color: blue;
        }
        .container-ul li:hover{
            color: blueviolet;
        }
    </style>
 </head>
 <body>
    
    <!-- Lista Ordenada -->

    <!-- css in-line, dentro da propria tag -->
    <h4>Lista <mark style="font-family: Arial, Helvetica, sans-serif;">Ordenada</mark></h4> 
    <ol class="container-ol">
        <li>Primeiro</li>
        <li>Segundo</li>
    </ol>

    <!-- Lista desordenada/bullet points -->
    <h4>Lista <mark>desordenada</mark></h4>
    <ul class="container-ul">
        <li>Item A</li>
        <li>Item B</li>
    </ul>

    <h3>Algumas tags miscelanias</h3>
    <ul class="container-ul">
        <li>Tag "em" faz o text ficar em <em>italico</em></li>
        <li>Tag "strong" faz o text ficar <strong>em negrito</strong></li>
        <li>Tag "mark" faz o text ficar em <mark>destaque</mark></li>
        <li>Tag "ins" faz o text ficar em <ins>sublinhado   </ins></li>
    </ul>
 </body>
 </html>
